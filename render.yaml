services:
  - type: web
    name: whatsapp-center
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: whatsapp-center-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: TRUST_PROXY
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: TWILIO_WEBHOOK_VALIDATE
        value: "true"
