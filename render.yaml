services:
  - type: web
    name: whatsapp-center
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: whatsapp-center-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TRUST_PROXY
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: TWILIO_WEBHOOK_VALIDATE
        value: "true"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_DEFAULT_MESSAGING_SERVICE_SID
        sync: false
