app = "whatsapp-center-your-name"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"
  TRUST_PROXY = "true"
  SESSION_COOKIE_SECURE = "true"
  TWILIO_WEBHOOK_VALIDATE = "true"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[mounts]
  source = "whatsapp_center_data"
  destination = "/app/data"
